services:
    app:
        build: .
        ports: ["8080:80"]
        volumes:
            - .:/app
        environment:
            - APP_ENV=dev
        depends_on:
            - database
    database:
        image: postgres:${DB_VERSION:-16}-alpine
        environment:
            POSTGRES_DB: ${DB_DATABASE:-app}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-!ChangeMe!}
            POSTGRES_USER: ${DB_USER:-app}
        healthcheck:
            test: [ "CMD", "pg_isready", "-d", "${DB_DATABASE:-app}", "-U", "${DB_USERNAME:-app}" ]
            timeout: 5s
            retries: 5
            start_period: 60s
        volumes:
            - db-data:/var/lib/postgresql/data:rw

volumes:
    db-data:
